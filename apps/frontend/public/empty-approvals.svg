<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <defs>
    <linearGradient id="ea-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16A34A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  
  <!-- Background glow -->
  <ellipse cx="100" cy="80" rx="90" ry="70" fill="url(#ea-grad)"/>
  
  <!-- Stable orbit (solid, not dashed — system is running) -->
  <ellipse cx="100" cy="80" rx="55" ry="40" fill="none" stroke="#E8E6E1" stroke-width="1"/>
  
  <!-- Center: green check node -->
  <circle cx="100" cy="80" r="18" fill="#16A34A" opacity="0.1"/>
  <circle cx="100" cy="80" r="10" fill="#16A34A"/>
  <path d="M 95 80 L 99 84 L 106 76" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Small orbiting agent node -->
  <circle cx="155" cy="80" r="4" fill="#7C5CFC" opacity="0.4"/>
  <circle cx="155" cy="80" r="2" fill="#7C5CFC"/>
  
  <!-- Ambient particles -->
  <circle cx="60" cy="55" r="1.5" fill="#7C5CFC" opacity="0.15"/>
  <circle cx="145" cy="105" r="1" fill="#16A34A" opacity="0.2"/>
  <circle cx="75" cy="110" r="1" fill="#7C5CFC" opacity="0.1"/>
</svg>