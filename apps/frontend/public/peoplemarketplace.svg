<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="pm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C5CFC" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  
  <!-- Background glow -->
  <ellipse cx="200" cy="150" rx="180" ry="130" fill="url(#pm-grad)"/>
  
  <!-- Large orbit rings -->
  <ellipse cx="200" cy="150" rx="120" ry="85" fill="none" stroke="#E8E6E1" stroke-width="1.5" stroke-dasharray="8 5"/>
  <ellipse cx="200" cy="150" rx="75" ry="55" fill="none" stroke="#E8E6E1" stroke-width="1" stroke-dasharray="5 4"/>
  <ellipse cx="200" cy="150" rx="35" ry="25" fill="none" stroke="#E8E6E1" stroke-width="0.8" stroke-dasharray="3 3"/>
  
  <!-- Center hub -->
  <circle cx="200" cy="150" r="22" fill="#7C5CFC" opacity="0.12"/>
  <circle cx="200" cy="150" r="12" fill="#7C5CFC"/>
  <circle cx="200" cy="150" r="4" fill="white"/>
  
  <!-- Disconnected platform nodes on orbits -->
  <!-- LinkedIn -->
  <circle cx="85" cy="120" r="16" fill="white" stroke="#E8E6E1" stroke-width="1.5"/>
  <rect x="80" y="115" width="10" height="10" rx="2" fill="none" stroke="#C4C1BB" stroke-width="1.3"/>
  
  <!-- X -->
  <circle cx="320" cy="100" r="16" fill="white" stroke="#E8E6E1" stroke-width="1.5"/>
  <path d="M 315 95 L 325 105 M 325 95 L 315 105" stroke="#C4C1BB" stroke-width="1.3" stroke-linecap="round"/>
  
  <!-- YouTube -->
  <circle cx="310" cy="200" r="16" fill="white" stroke="#E8E6E1" stroke-width="1.5"/>
  <polygon points="305,195 305,205 315,200" fill="none" stroke="#C4C1BB" stroke-width="1.2"/>
  
  <!-- Instagram -->
  <circle cx="90" cy="200" r="16" fill="white" stroke="#E8E6E1" stroke-width="1.5"/>
  <circle cx="90" cy="200" r="5.5" fill="none" stroke="#C4C1BB" stroke-width="1.1"/>
  <circle cx="95" cy="195" r="1.2" fill="#C4C1BB"/>
  
  <!-- TikTok -->
  <circle cx="200" cy="60" r="16" fill="white" stroke="#E8E6E1" stroke-width="1.5"/>
  <path d="M 197 55 L 197 65 Q 197 68 194 68" fill="none" stroke="#C4C1BB" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 197 58 Q 200 58 203 55" fill="none" stroke="#C4C1BB" stroke-width="1.1" stroke-linecap="round"/>
  
  <!-- Threads -->
  <circle cx="200" cy="240" r="16" fill="white" stroke="#E8E6E1" stroke-width="1.5"/>
  <path d="M 196 236 Q 204 236 204 243 Q 204 248 196 248" fill="none" stroke="#C4C1BB" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Dashed connections -->
  <line x1="188" y1="142" x2="101" y2="124" stroke="#D4D1CC" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="212" y1="142" x2="304" y2="104" stroke="#D4D1CC" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="212" y1="158" x2="294" y2="196" stroke="#D4D1CC" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="188" y1="158" x2="106" y2="196" stroke="#D4D1CC" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="200" y1="138" x2="200" y2="76" stroke="#D4D1CC" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="200" y1="162" x2="200" y2="224" stroke="#D4D1CC" stroke-width="0.8" stroke-dasharray="4 3"/>
  
  <!-- Ambient particles -->
  <circle cx="145" cy="80" r="2" fill="#7C5CFC" opacity="0.15"/>
  <circle cx="260" cy="240" r="2" fill="#7C5CFC" opacity="0.12"/>
  <circle cx="55" cy="160" r="1.5" fill="#7C5CFC" opacity="0.1"/>
  <circle cx="345" cy="150" r="1.5" fill="#7C5CFC" opacity="0.1"/>
  <circle cx="150" cy="250" r="1" fill="#A78BFA" opacity="0.15"/>
  <circle cx="270" cy="70" r="1" fill="#A78BFA" opacity="0.12"/>
</svg>
