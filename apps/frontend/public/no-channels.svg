<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" width="280" height="220">
  <defs>
    <linearGradient id="nc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C5CFC" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.04"/>
    </linearGradient>
  </defs>
  
  <!-- Background field -->
  <ellipse cx="140" cy="110" rx="130" ry="100" fill="url(#nc-grad)"/>
  
  <!-- Orbit rings (dashed — suggesting potential, not yet active) -->
  <ellipse cx="140" cy="110" rx="80" ry="60" fill="none" stroke="#E8E6E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <ellipse cx="140" cy="110" rx="50" ry="38" fill="none" stroke="#E8E6E1" stroke-width="1" stroke-dasharray="4 3"/>
  
  <!-- Center hub (the agent) -->
  <circle cx="140" cy="110" r="16" fill="#7C5CFC" opacity="0.15"/>
  <circle cx="140" cy="110" r="8" fill="#7C5CFC"/>
  <circle cx="140" cy="110" r="3" fill="white"/>
  
  <!-- Disconnected channel nodes (hollow — not yet connected) -->
  <!-- LinkedIn position -->
  <circle cx="60" cy="90" r="12" fill="white" stroke="#E8E6E1" stroke-width="1.5"/>
  <rect x="56" y="86" width="8" height="8" rx="1.5" fill="none" stroke="#C4C1BB" stroke-width="1.2"/>
  
  <!-- X/Twitter position -->
  <circle cx="220" cy="80" r="12" fill="white" stroke="#E8E6E1" stroke-width="1.5"/>
  <path d="M 216 76 L 224 84 M 224 76 L 216 84" stroke="#C4C1BB" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Bluesky position -->
  <circle cx="200" cy="150" r="12" fill="white" stroke="#E8E6E1" stroke-width="1.5"/>
  <path d="M 196 152 Q 200 144 204 152" fill="none" stroke="#C4C1BB" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Instagram position -->
  <circle cx="80" cy="150" r="12" fill="white" stroke="#E8E6E1" stroke-width="1.5"/>
  <circle cx="80" cy="150" r="4" fill="none" stroke="#C4C1BB" stroke-width="1"/>
  <circle cx="84" cy="146" r="1" fill="#C4C1BB"/>
  
  <!-- Threads position -->
  <circle cx="140" cy="45" r="12" fill="white" stroke="#E8E6E1" stroke-width="1.5"/>
  <path d="M 137 42 Q 143 42 143 48 Q 143 52 137 52" fill="none" stroke="#C4C1BB" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Dashed connection lines from center to nodes (potential connections) -->
  <line x1="132" y1="104" x2="72" y2="94" stroke="#D4D1CC" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="148" y1="104" x2="210" y2="84" stroke="#D4D1CC" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="148" y1="118" x2="192" y2="146" stroke="#D4D1CC" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="132" y1="118" x2="88" y2="146" stroke="#D4D1CC" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="140" y1="102" x2="140" y2="57" stroke="#D4D1CC" stroke-width="0.8" stroke-dasharray="3 3"/>
  
  <!-- Tiny floating particles (ambient) -->
  <circle cx="105" cy="65" r="1.5" fill="#7C5CFC" opacity="0.2"/>
  <circle cx="175" cy="170" r="1.5" fill="#7C5CFC" opacity="0.15"/>
  <circle cx="45" cy="130" r="1" fill="#7C5CFC" opacity="0.12"/>
  <circle cx="235" cy="120" r="1" fill="#7C5CFC" opacity="0.12"/>
</svg>