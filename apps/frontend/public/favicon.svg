<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="orbit-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  
  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="112.64" fill="#7C5CFC"/>
  
  <!-- Outer orbit arc -->
  <path d="M 381.5 150.7 A 163.8 163.8 0 1 1 102.0 200.0" 
        fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="17.92" stroke-linecap="round"/>
  
  <!-- Inner orbit arc -->
  <path d="M 238.2 356.8 A 102.4 102.4 0 1 1 334.4 190.2" 
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="12.8" stroke-linecap="round"/>
  
  <!-- Primary agent node -->
  <circle cx="417.4" cy="284.5" r="35.8" fill="white"/>
  
  <!-- Secondary agent node (smaller) -->
  <circle cx="159.8" cy="221.0" r="21.5" fill="rgba(255,255,255,0.7)"/>
  
  <!-- Center point -->
  <circle cx="256.0" cy="256.0" r="15.36" fill="rgba(255,255,255,0.5)"/>
</svg>