<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#FAFAF8"/>
  <text x="400" y="28" text-anchor="middle" font-family="system-ui" font-size="11" fill="#A3A3A3" letter-spacing="3">MAV — FINAL LOGO</text>

  <!-- ── MARK (large, light bg) ── -->
  <text x="200" y="58" text-anchor="middle" font-family="system-ui" font-size="9" fill="#C0BDB8" letter-spacing="2">MARK</text>
  <g transform="translate(110, 75)">
    <circle cx="30"  cy="110" r="18" fill="#7C5CFC" opacity="0.08"/>
    <circle cx="58"  cy="84"  r="22" fill="#7C5CFC" opacity="0.18"/>
    <circle cx="100" cy="48"  r="32" fill="#7C5CFC"/>
    <circle cx="100" cy="48"  r="12" fill="white"/>
  </g>

  <!-- ── FAVICON ── -->
  <text x="580" y="58" text-anchor="middle" font-family="system-ui" font-size="9" fill="#C0BDB8" letter-spacing="2">FAVICON 64px</text>
  <g transform="translate(536, 68)">
    <rect width="88" height="88" rx="20" fill="#7C5CFC"/>
    <circle cx="22" cy="62" r="9"  fill="white" opacity="0.1"/>
