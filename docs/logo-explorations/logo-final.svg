  <text x="400" y="484" text-anchor="middle" font-family="system-ui" font-size="9" fill="#C0BDB8" letter-spacing="2">INLINE — BRAND</text>
  <rect x="40" y="496" width="720" height="72" rx="12" fill="#7C5CFC"/>
  <g transform="translate(72, 514)">
    <circle cx="6"  cy="22" r="6"  fill="white" opacity="0.1"/>
    <circle cx="16" cy="16" r="8"  fill="white" opacity="0.2"/>
    <circle cx="30" cy="8"  r="12" fill="white"/>
    <circle cx="30" cy="8"  r="4.5" fill="#7C5CFC"/>
    <text x="50" y="24" font-family="system-ui" font-size="28" font-weight="600" fill="white" letter-spacing="-1.5">mav</text>
