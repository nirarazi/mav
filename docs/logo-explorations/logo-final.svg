    <circle cx="56" cy="28" r="18" fill="white"/>
    <circle cx="56" cy="28" r="7"  fill="#7C5CFC"/>
  </g>

  <!-- ── LIGHT BG INLINE ── -->
  <text x="400" y="248" text-anchor="middle" font-family="system-ui" font-size="9" fill="#C0BDB8" letter-spacing="2">INLINE — LIGHT</text>
  <rect x="40" y="260" width="720" height="72" rx="12" fill="white" stroke="#E8E6E1" stroke-width="1"/>
  <g transform="translate(72, 278)">
    <circle cx="6"  cy="22" r="6"  fill="#7C5CFC" opacity="0.08"/>
    <circle cx="16" cy="16" r="8"  fill="#7C5CFC" opacity="0.18"/>
    <circle cx="30" cy="8"  r="12" fill="#7C5CFC"/>
    <circle cx="30" cy="8"  r="4.5" fill="white"/>
    <text x="50" y="24" font-family="system-ui" font-size="28" font-weight="600" fill="#1A1A1A" letter-spacing="-1.5">mav</text>
  </g>

  <!-- ── DARK BG INLINE ── -->
  <text x="400" y="366" text-anchor="middle" font-family="system-ui" font-size="9" fill="#C0BDB8" letter-spacing="2">INLINE — DARK</text>
  <rect x="40" y="378" width="720" height="72" rx="12" fill="#1A1A1A"/>
  <g transform="translate(72, 396)">
