    <rect x="88" y="88" width="6" height="27" rx="3" fill="#7C5CFC" opacity="0.25" transform="rotate(180, 91, 85)"/>
    <rect x="104" y="70" width="6" height="45" rx="3" fill="#7C5CFC" opacity="0.45" transform="rotate(180, 107, 85)"/>
    <rect x="120" y="60" width="6" height="55" rx="3" fill="#7C5CFC" opacity="0.65" transform="rotate(180, 123, 85)"/>
