<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <rect width="900" height="700" fill="#FAFAF8"/>
  <text x="450" y="30" text-anchor="middle" font-family="system-ui" font-size="11" fill="#A3A3A3" letter-spacing="3">DIRECTION 6 — CONTAINED PULSE — REFINEMENTS</text>

  <!-- 6A: Rounded brackets, smooth sine pulse -->
  <g transform="translate(30, 55)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">6A · SMOOTH SINE</text>
    <rect x="20" y="15" width="200" height="150" rx="16" fill="white" stroke="#E8E6E1" stroke-width="1"/>
    <path d="M 55 45 Q 50 45 50 50 L 50 110 Q 50 115 55 115" fill="none" stroke="#7C5CFC" stroke-width="5" stroke-linecap="round"/>
    <path d="M 185 45 Q 190 45 190 50 L 190 110 Q 190 115 185 115" fill="none" stroke="#7C5CFC" stroke-width="5" stroke-linecap="round"/>
    <path d="M 65 80 C 85 50 105 50 120 80 C 135 110 155 110 175 80" fill="none" stroke="#7C5CFC" stroke-width="3.5" stroke-linecap="round"/>
    <text x="120" y="145" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="600" fill="#1A1A1A" letter-spacing="-1">mav</text>
  </g>

  <!-- 6B: Square brackets, sharp heartbeat -->
  <g transform="translate(260, 55)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">6B · SHARP BEAT</text>
