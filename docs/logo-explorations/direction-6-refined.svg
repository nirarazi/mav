    <path d="M 60 45 L 50 45 L 50 115 L 60 115" fill="none" stroke="#7C5CFC" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 180 45 L 190 45 L 190 115 L 180 115" fill="none" stroke="#7C5CFC" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 65 80 L 90 80 L 100 50 L 115 110 L 125 65 L 135 95 L 145 80 L 175 80" fill="none" stroke="#7C5CFC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="120" y="145" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="700" fill="#1A1A1A" letter-spacing="-1.5">mav</text>
  </g>

  <!-- 6C: Thin elegant brackets, single peak -->
