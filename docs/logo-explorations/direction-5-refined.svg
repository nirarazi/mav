<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <rect width="900" height="700" fill="#FAFAF8"/>
  <text x="450" y="30" text-anchor="middle" font-family="system-ui" font-size="11" fill="#A3A3A3" letter-spacing="3">DIRECTION 5 — AGENT IN MOTION — REFINEMENTS</text>

  <!-- 5A: Tight trail, heavier agent -->
  <g transform="translate(30, 55)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">5A · HEAVY AGENT</text>
    <rect x="20" y="15" width="200" height="150" rx="16" fill="white" stroke="#E8E6E1" stroke-width="1"/>
    <circle cx="75" cy="100" r="14" fill="#7C5CFC" opacity="0.05"/>
    <circle cx="92" cy="92" r="14" fill="#7C5CFC" opacity="0.10"/>
    <circle cx="112" cy="83" r="16" fill="#7C5CFC" opacity="0.18"/>
    <circle cx="140" cy="72" r="22" fill="#7C5CFC"/>
    <circle cx="140" cy="72" r="7" fill="white"/>
    <path d="M 75 100 Q 105 85 140 72" fill="none" stroke="#7C5CFC" stroke-width="1.5" opacity="0.1"/>
    <text x="120" y="145" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="700" fill="#1A1A1A" letter-spacing="-1.5">mav</text>
  </g>

  <!-- 5B: Minimal — just 2 shadows + dot -->
  <g transform="translate(260, 55)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">5B · MINIMAL</text>
    <rect x="20" y="15" width="200" height="150" rx="16" fill="white" stroke="#E8E6E1" stroke-width="1"/>
    <circle cx="100" cy="92" r="12" fill="#7C5CFC" opacity="0.08"/>
    <circle cx="118" cy="83" r="14" fill="#7C5CFC" opacity="0.18"/>
    <circle cx="142" cy="72" r="18" fill="#7C5CFC"/>
    <circle cx="142" cy="72" r="6" fill="white"/>
    <text x="120" y="145" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="600" fill="#1A1A1A" letter-spacing="-1">mav</text>
  </g>

  <!-- 5C: Arc trail instead of circles -->
  <g transform="translate(490, 55)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">5C · ARC TRAIL</text>
    <rect x="20" y="15" width="200" height="150" rx="16" fill="white" stroke="#E8E6E1" stroke-width="1"/>
    <path d="M 65 110 Q 95 85 145 70" fill="none" stroke="#7C5CFC" stroke-width="6" stroke-linecap="round" opacity="0.12"/>
    <path d="M 85 100 Q 110 82 145 70" fill="none" stroke="#7C5CFC" stroke-width="5" stroke-linecap="round" opacity="0.22"/>
    <circle cx="145" cy="70" r="18" fill="#7C5CFC"/>
    <circle cx="145" cy="70" r="6" fill="white"/>
    <text x="120" y="145" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="600" fill="#1A1A1A" letter-spacing="-1">mav</text>
  </g>

  <!-- 5D: Diagonal rise, three equal dots fading -->
  <g transform="translate(30, 265)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">5D · EQUAL STEPS</text>
    <rect x="20" y="15" width="200" height="150" rx="16" fill="white" stroke="#E8E6E1" stroke-width="1"/>
    <circle cx="75" cy="105" r="12" fill="#7C5CFC" opacity="0.08"/>
    <circle cx="105" cy="88" r="12" fill="#7C5CFC" opacity="0.18"/>
    <circle cx="135" cy="71" r="12" fill="#7C5CFC" opacity="0.35"/>
    <circle cx="165" cy="54" r="12" fill="#7C5CFC"/>
    <circle cx="165" cy="54" r="4" fill="white"/>
    <text x="120" y="145" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="600" fill="#1A1A1A" letter-spacing="-1">mav</text>
  </g>

  <!-- 5E: Single comet — dot with a soft gradient tail -->
  <g transform="translate(260, 265)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">5E · COMET</text>
    <rect x="20" y="15" width="200" height="150" rx="16" fill="white" stroke="#E8E6E1" stroke-width="1"/>
    <defs>
      <linearGradient id="comet-tail" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#7C5CFC" stop-opacity="0"/>
        <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0.35"/>
      </linearGradient>
    </defs>
    <path d="M 55 105 Q 100 85 142 70" fill="none" stroke="url(#comet-tail)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="148" cy="68" r="20" fill="#7C5CFC"/>
    <circle cx="148" cy="68" r="6.5" fill="white"/>
    <text x="120" y="145" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="600" fill="#1A1A1A" letter-spacing="-1">mav</text>
  </g>

  <!-- 5F: Upward vertical — dots rising straight up -->
  <g transform="translate(490, 265)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">5F · VERTICAL RISE</text>
    <rect x="20" y="15" width="200" height="150" rx="16" fill="white" stroke="#E8E6E1" stroke-width="1"/>
    <circle cx="120" cy="130" r="10" fill="#7C5CFC" opacity="0.06"/>
    <circle cx="120" cy="108" r="11" fill="#7C5CFC" opacity="0.12"/>
    <circle cx="120" cy="84" r="13" fill="#7C5CFC" opacity="0.25"/>
    <circle cx="120" cy="55" r="17" fill="#7C5CFC"/>
    <circle cx="120" cy="55" r="5.5" fill="white"/>
    <text x="120" y="155" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="600" fill="#1A1A1A" letter-spacing="-1">mav</text>
  </g>

  <!-- Favicon row -->
  <text x="450" y="455" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">FAVICONS (32px)</text>

  <!-- 5A fav -->
  <g transform="translate(80, 475)">
    <rect width="48" height="48" rx="12" fill="#7C5CFC"/>
    <circle cx="16" cy="28" r="5" fill="white" opacity="0.12"/>
    <circle cx="21" cy="25" r="6" fill="white" opacity="0.2"/>
    <circle cx="30" cy="20" r="8" fill="white"/>
    <circle cx="30" cy="20" r="2.5" fill="#7C5CFC"/>
    <text x="24" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6B6B6B">5A</text>
  </g>

  <!-- 5B fav -->
  <g transform="translate(200, 475)">
    <rect width="48" height="48" rx="12" fill="#7C5CFC"/>
    <circle cx="18" cy="27" r="5" fill="white" opacity="0.1"/>
    <circle cx="25" cy="24" r="6" fill="white" opacity="0.22"/>
    <circle cx="33" cy="20" r="7" fill="white"/>
    <circle cx="33" cy="20" r="2.2" fill="#7C5CFC"/>
    <text x="24" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6B6B6B">5B</text>
  </g>

  <!-- 5C fav -->
  <g transform="translate(320, 475)">
    <rect width="48" height="48" rx="12" fill="#7C5CFC"/>
    <path d="M 10 33 Q 20 24 32 19" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 17 29 Q 24 23 32 19" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="33" cy="18" r="8" fill="white"/>
    <circle cx="33" cy="18" r="2.5" fill="#7C5CFC"/>
    <text x="24" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6B6B6B">5C</text>
  </g>

  <!-- 5D fav -->
  <g transform="translate(440, 475)">
    <rect width="48" height="48" rx="12" fill="#7C5CFC"/>
    <circle cx="12" cy="34" r="4.5" fill="white" opacity="0.1"/>
    <circle cx="20" cy="28" r="4.5" fill="white" opacity="0.2"/>
    <circle cx="28" cy="22" r="4.5" fill="white" opacity="0.38"/>
    <circle cx="36" cy="16" r="5" fill="white"/>
    <circle cx="36" cy="16" r="1.8" fill="#7C5CFC"/>
    <text x="24" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6B6B6B">5D</text>
  </g>

  <!-- 5E fav -->
  <g transform="translate(560, 475)">
    <rect width="48" height="48" rx="12" fill="#7C5CFC"/>
    <defs>
      <linearGradient id="fav-comet" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="white" stop-opacity="0"/>
        <stop offset="100%" stop-color="white" stop-opacity="0.3"/>
      </linearGradient>
    </defs>
    <path d="M 8 36 Q 20 26 32 18" fill="none" stroke="url(#fav-comet)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="33" cy="17" r="8" fill="white"/>
    <circle cx="33" cy="17" r="2.5" fill="#7C5CFC"/>
    <text x="24" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6B6B6B">5E</text>
  </g>

  <!-- 5F fav -->
  <g transform="translate(680, 475)">
    <rect width="48" height="48" rx="12" fill="#7C5CFC"/>
    <circle cx="24" cy="38" r="4" fill="white" opacity="0.08"/>
    <circle cx="24" cy="30" r="4.5" fill="white" opacity="0.15"/>
    <circle cx="24" cy="22" r="5" fill="white" opacity="0.3"/>
    <circle cx="24" cy="12" r="6.5" fill="white"/>
    <circle cx="24" cy="12" r="2" fill="#7C5CFC"/>
    <text x="24" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6B6B6B">5F</text>
  </g>

  <!-- Dark inline row -->
  <text x="450" y="570" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">INLINE ON DARK</text>
  <rect x="50" y="585" width="800" height="65" rx="12" fill="#1A1A1A"/>
  
  <g transform="translate(80, 602)">
    <circle cx="6" cy="15" r="4" fill="white" opacity="0.1"/>
    <circle cx="13" cy="12" r="5" fill="white" opacity="0.2"/>
    <circle cx="22" cy="8" r="7" fill="white"/>
    <circle cx="22" cy="8" r="2.2" fill="#1A1A1A"/>
    <text x="36" y="16" font-family="system-ui" font-size="20" font-weight="600" fill="white" letter-spacing="-1">mav</text>
    <text x="80" y="16" font-family="system-ui" font-size="20" font-weight="300" fill="#666" letter-spacing="-0.5">.social</text>
  </g>

  <g transform="translate(350, 602)">
    <path d="M 2 22 Q 12 14 24 8" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="26" cy="7" r="7" fill="white"/>
    <circle cx="26" cy="7" r="2.2" fill="#1A1A1A"/>
    <text x="40" y="16" font-family="system-ui" font-size="20" font-weight="600" fill="white" letter-spacing="-1">mav</text>
    <text x="84" y="16" font-family="system-ui" font-size="20" font-weight="300" fill="#666" letter-spacing="-0.5">.social</text>
  </g>

  <g transform="translate(620, 602)">
    <circle cx="5" cy="18" r="3.5" fill="white" opacity="0.1"/>
    <circle cx="12" cy="14" r="3.5" fill="white" opacity="0.22"/>
    <circle cx="19" cy="10" r="3.5" fill="white" opacity="0.4"/>
    <circle cx="26" cy="6" r="4" fill="white"/>
    <text x="36" y="16" font-family="system-ui" font-size="20" font-weight="600" fill="white" letter-spacing="-1">mav</text>
    <text x="80" y="16" font-family="system-ui" font-size="20" font-weight="300" fill="#666" letter-spacing="-0.5">.social</text>
  </g>
