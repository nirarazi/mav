    <path d="M 120 105 L 175 48" fill="none" stroke="#4F46E5" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="175" cy="43" r="11" fill="#4F46E5"/>
    <circle cx="175" cy="43" r="4" fill="white"/>
