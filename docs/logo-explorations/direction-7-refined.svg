    <path d="M 13 38 L 13 18" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <path d="M 13 18 L 24 30" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 24 30 L 35 18" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 35 18 L 35 38" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
