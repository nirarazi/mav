    <circle cx="65" cy="36" r="8" fill="#7C5CFC"/>
    <circle cx="65" cy="36" r="3" fill="white"/>
    <circle cx="175" cy="36" r="8" fill="#7C5CFC"/>
    <circle cx="175" cy="36" r="3" fill="white"/>
    <text x="120" y="157" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="500" fill="#1A1A1A" letter-spacing="-0.5">mav</text>
  </g>

  <!-- 7D: Asymmetric — left agent bigger (lead agent) -->
  <g transform="translate(30, 275)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">7D · ASYMMETRIC LEAD</text>
    <rect x="20" y="15" width="200" height="160" rx="16" fill="white" stroke="#E8E6E1" stroke-width="1"/>
    <path d="M 60 125 L 60 44" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round"/>
    <path d="M 60 44 L 118 100" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 118 100 L 175 55" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 175 55 L 175 125" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round"/>
    <!-- Left agent: larger (lead) -->
    <circle cx="60" cy="38" r="13" fill="#7C5CFC"/>
    <circle cx="60" cy="38" r="5" fill="white"/>
    <!-- Right agent: smaller (follower) -->
    <circle cx="175" cy="49" r="9" fill="#7C5CFC"/>
    <circle cx="175" cy="49" r="3.5" fill="white"/>
    <text x="120" y="157" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="600" fill="#1A1A1A" letter-spacing="-1">mav</text>
  </g>

