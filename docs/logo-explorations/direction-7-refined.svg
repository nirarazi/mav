<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800" width="900" height="800">
  <rect width="900" height="800" fill="#FAFAF8"/>
  <text x="450" y="28" text-anchor="middle" font-family="system-ui" font-size="11" fill="#A3A3A3" letter-spacing="3">DIRECTION 7 — SPLIT M — REFINEMENTS</text>

  <!-- 7A: Deeper V, solid filled dots, no center node -->
  <g transform="translate(30, 55)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">7A · DEEP V, NO CENTER</text>
    <rect x="20" y="15" width="200" height="160" rx="16" fill="white" stroke="#E8E6E1" stroke-width="1"/>
    <!-- M strokes with deep V -->
    <path d="M 65 125 L 65 48" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round"/>
    <path d="M 65 48 L 120 105" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 120 105 L 175 48" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 175 48 L 175 125" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round"/>
    <!-- Agent nodes — solid -->
    <circle cx="65" cy="43" r="11" fill="#7C5CFC"/>
    <circle cx="65" cy="43" r="4" fill="white"/>
    <circle cx="175" cy="43" r="11" fill="#7C5CFC"/>
    <circle cx="175" cy="43" r="4" fill="white"/>
    <text x="120" y="157" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="600" fill="#1A1A1A" letter-spacing="-1">mav</text>
  </g>

  <!-- 7B: Deeper V, with subtle center node -->
  <g transform="translate(260, 55)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">7B · DEEP V, CENTER NODE</text>
    <rect x="20" y="15" width="200" height="160" rx="16" fill="white" stroke="#E8E6E1" stroke-width="1"/>
    <path d="M 65 125 L 65 48" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round"/>
    <path d="M 65 48 L 120 105" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 120 105 L 175 48" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 175 48 L 175 125" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round"/>
    <!-- Agent nodes -->
    <circle cx="65" cy="43" r="11" fill="#7C5CFC"/>
    <circle cx="65" cy="43" r="4" fill="white"/>
    <circle cx="175" cy="43" r="11" fill="#7C5CFC"/>
    <circle cx="175" cy="43" r="4" fill="white"/>
    <!-- Center meeting node -->
    <circle cx="120" cy="105" r="7" fill="white" stroke="#7C5CFC" stroke-width="2.5"/>
    <text x="120" y="157" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="600" fill="#1A1A1A" letter-spacing="-1">mav</text>
  </g>

  <!-- 7C: Mid V, thinner strokes, floating dots -->
  <g transform="translate(490, 55)">
    <text x="120" y="0" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">7C · MID V, THIN + FLOAT</text>
    <rect x="20" y="15" width="200" height="160" rx="16" fill="white" stroke="#E8E6E1" stroke-width="1"/>
    <path d="M 65 125 L 65 52" fill="none" stroke="#7C5CFC" stroke-width="6" stroke-linecap="round"/>
    <path d="M 65 52 L 120 95" fill="none" stroke="#7C5CFC" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 120 95 L 175 52" fill="none" stroke="#7C5CFC" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 175 52 L 175 125" fill="none" stroke="#7C5CFC" stroke-width="6" stroke-linecap="round"/>
