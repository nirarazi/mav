    <circle cx="14" cy="12" r="1.5" fill="#7C5CFC"/>
    <circle cx="34" cy="12" r="4" fill="white"/>
    <circle cx="34" cy="12" r="1.5" fill="#7C5CFC"/>
    <text x="24" y="62" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6B6B6B">7E</text>
  </g>

  <!-- 7F fav -->
  <g transform="translate(548, 496)">
    <rect width="48" height="48" rx="12" fill="#1A1A2E"/>
    <path d="M 13 38 L 13 14" fill="none" stroke="#7C5CFC" stroke-width="3.5" stroke-linecap="round"/>
