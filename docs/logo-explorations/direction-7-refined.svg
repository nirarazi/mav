    <rect x="5" y="5" width="38" height="38" rx="14" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
    <path d="M 14 38 L 14 16" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 14 16 L 24 28" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 24 28 L 34 16" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 34 16 L 34 38" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
