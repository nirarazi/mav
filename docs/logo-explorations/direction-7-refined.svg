    <path d="M 0 5 L 12 17" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 12 17 L 24 5" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 24 5 L 24 26" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="0" cy="2.5" r="4" fill="white"/>
