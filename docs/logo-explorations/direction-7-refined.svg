    <path d="M 65 48 L 120 105" fill="none" stroke="#7C5CFC" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="65" cy="43" r="11" fill="#7C5CFC"/>
    <circle cx="65" cy="43" r="4" fill="white"/>
    <!-- Right agent + stroke: warm slate -->
