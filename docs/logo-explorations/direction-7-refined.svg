    <circle cx="13" cy="9" r="1.5" fill="#7C5CFC"/>
    <circle cx="35" cy="9" r="4" fill="white"/>
    <circle cx="35" cy="9" r="1.5" fill="#7C5CFC"/>
    <text x="24" y="62" text-anchor="middle" font-family="system-ui" font-size="9" fill="#6B6B6B">7C</text>
