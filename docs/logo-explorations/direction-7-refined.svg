    <path d="M 70 120 L 70 52" fill="none" stroke="#7C5CFC" stroke-width="8" stroke-linecap="round"/>
    <path d="M 70 52 L 120 98" fill="none" stroke="#7C5CFC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 120 98 L 170 52" fill="none" stroke="#7C5CFC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 170 52 L 170 120" fill="none" stroke="#7C5CFC" stroke-width="8" stroke-linecap="round"/>
    <circle cx="70" cy="46" r="10" fill="#7C5CFC"/>
    <circle cx="70" cy="46" r="3.5" fill="white"/>
    <circle cx="170" cy="46" r="10" fill="#7C5CFC"/>
    <circle cx="170" cy="46" r="3.5" fill="white"/>
    <text x="120" y="157" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="600" fill="#1A1A1A" letter-spacing="-1">mav</text>
  </g>

  <!-- 7F: Two-color — each agent distinct -->
