  <!-- INLINE LOGOS + DARK BAR -->
  <text x="450" y="590" text-anchor="middle" font-family="system-ui" font-size="10" fill="#A3A3A3" letter-spacing="2">INLINE LOCKUPS</text>

  <!-- Light bg inline — 7A style -->
  <rect x="40" y="605" width="380" height="56" rx="12" fill="white" stroke="#E8E6E1" stroke-width="1"/>
  <g transform="translate(60, 620)">
    <path d="M 0 22 L 0 4" fill="none" stroke="#7C5CFC" stroke-width="3" stroke-linecap="round"/>
    <path d="M 0 4 L 10 14" fill="none" stroke="#7C5CFC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
