    <path d="M 0 4 L 10 14" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 10 14 L 20 4" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 20 4 L 20 22" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
